<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      .host { fill: #f0f7ff; stroke: #00509E; stroke-width: 2; stroke-dasharray: 5,5; rx: 12; ry: 12; }
      .ai { fill: #ffffff; stroke: #333333; stroke-width: 2; rx: 8; ry: 8; }
      .docker { fill: #e6f7ff; stroke: #0284c7; stroke-width: 2; rx: 8; ry: 8; }
      .sn { fill: #fff0f0; stroke: #cc0000; stroke-width: 2; rx: 8; ry: 8; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #334155; }
      .title { font-weight: bold; font-size: 16px; fill: #0f172a; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; }
      .arrow-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 12px; fill: #475569; text-anchor: middle; font-weight: 500; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-reverse" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background for transparency safety -->
  <rect width="800" height="400" fill="#ffffff" />

  <!-- Host PC Bounding Box -->
  <rect class="host" x="40" y="40" width="400" height="320" />
  <text class="text title" x="60" y="70">💻 ホスト PC (Host PC)</text>

  <!-- AI Client -->
  <rect class="ai" x="80" y="100" width="320" height="60" />
  <text class="text title" x="100" y="135">🤖 AI クライアント</text>
  <text class="text" x="240" y="135">(Claude Desktop / Cursor)</text>

  <!-- Stdio Arrow -->
  <line class="arrow" x1="240" y1="160" x2="240" y2="240" marker-end="url(#arrowhead)" marker-start="url(#arrowhead-reverse)"/>
  <rect fill="#ffffff" x="150" y="190" width="180" height="20" rx="4" ry="4" stroke="#e2e8f0" stroke-width="1" />
  <text class="arrow-text" x="240" y="204">↕ stdio (MCP プロトコル)</text>

  <!-- Docker Container -->
  <rect class="docker" x="80" y="240" width="320" height="80" />
  <text class="text title" x="100" y="275">🐳 Docker コンテナ</text>
  <text class="text" x="100" y="300">servicenow-mcp サーバー</text>

  <!-- ServiceNow -->
  <rect class="sn" x="540" y="240" width="220" height="80" />
  <text class="text title" x="560" y="275">☁️ ServiceNow</text>
  <text class="text" x="560" y="300">インスタンス</text>

  <!-- HTTPS Arrow -->
  <line class="arrow" x1="400" y1="280" x2="540" y2="280" marker-end="url(#arrowhead)" marker-start="url(#arrowhead-reverse)"/>
  <rect fill="#ffffff" x="425" y="260" width="100" height="20" rx="4" ry="4" stroke="#e2e8f0" stroke-width="1" />
  <text class="arrow-text" x="475" y="274">↔ HTTPS / REST</text>
</svg>